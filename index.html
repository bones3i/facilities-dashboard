<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBU Facilities Live</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.4.0/ical.min.js"></script>
  <style>
    :root {
      --navy: #00263E;
      --gold: #F2C94C;
      --crimson: #9F1D35;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--navy);
      color: #fff;
      margin: 0;
      padding: 12px;
      max-width: 420px; /* perfect for sidebar */
      margin: 0 auto;
    }
    h1 {
      color: var(--gold);
      font-size: 1.4em;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .tile {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .location {
      flex: 1;
      font-size: 1.15em;
      font-weight: bold;
    }
    .light {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 18px currentColor;
    }
    .green { background: #22ff44; color: #22ff44; }
    .red   { background: #ff2222; color: #ff2222; }
    .status {
      font-size: 1.35em;
      font-weight: bold;
      min-width: 110px;
    }
    .info {
      font-size: 0.95em;
      opacity: 0.85;
      margin-top: 4px;
      display: block;
    }
    button {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .last-updated {
      font-size: 0.85em;
      opacity: 0.7;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>🏟️ MBU Facilities</h1>
  <button onclick="loadDashboard()">🔄 Refresh Now</button>
  <div id="dashboard" class="grid"></div>
  <div id="lastUpdated" class="last-updated"></div>

  <script>
    const ICS_URL = "https://outlook.office365.com/owa/calendar/97967830e98945e38f6aaefb6042710b@mbu.edu/0521f667626a42ee90cfb1ff0222d6338862321817573157099/calendar.ics";

    async function loadDashboard() {
      const dashboard = document.getElementById("dashboard");
      dashboard.innerHTML = "<p style='color:#F2C94C;text-align:center;'>Loading live data…</p>";

      try {
        let icsText;
        // Try direct + proxies
        try { const r = await fetch(ICS_URL); if (r.ok) icsText = await r.text(); } catch(e){}
        if (!icsText) {
          const proxies = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?", "https://api.codetabs.com/v1/proxy?quest="];
          for (let p of proxies) {
            try {
              const r = await fetch(p + encodeURIComponent(ICS_URL));
              if (r.ok) { icsText = await r.text(); if (icsText.includes("BEGIN:VCALENDAR")) break; }
            } catch(e){}
          }
        }

        const jcalData = ICAL.parse(icsText);
        const comp = new ICAL.Component(jcalData);
        const events = comp.getAllSubcomponents("vevent");

        const now = new Date();
        dashboard.innerHTML = "";

        const locations = ["Main Gym", "FCG", "Weight Room"];

        locations.forEach(loc => {
          let currentEvent = null;
          let nextEvent = null;
          let isOccupied = false;

          // Find current and next events for this location
          const relevantEvents = [];
          events.forEach(vevent => {
            const event = new ICAL.Event(vevent);
            const locField = (event.location || "").toLowerCase();
            if (locField.includes(loc.toLowerCase())) relevantEvents.push(event);
          });

          // Sort by start time
          relevantEvents.sort((a,b) => a.startDate.toJSDate() - b.startDate.toJSDate());

          for (let ev of relevantEvents) {
            const start = ev.startDate.toJSDate();
            const end = ev.endDate.toJSDate();
            if (start <= now && end >= now) {
              isOccupied = true;
              currentEvent = ev;
            } else if (!nextEvent && start > now) {
              nextEvent = ev;
              break;
            }
          }

          // Build extra info text
          let infoText = "";
          if (isOccupied && currentEvent) {
            const endTime = currentEvent.endDate.toJSDate();
            const endStr = endTime.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZone:'America/Chicago'});
            infoText = `Available at ${endStr}`;
            
            // Look for next gap >=20 minutes
            for (let i = 0; i < relevantEvents.length; i++) {
              if (relevantEvents[i] === currentEvent) {
                if (i + 1 < relevantEvents.length) {
                  const nextStart = relevantEvents[i+1].startDate.toJSDate();
                  const gapMin = Math.round((nextStart - endTime) / 60000);
                  if (gapMin >= 20) {
                    infoText += ` for ${gapMin} minutes`;
                    break;
                  }
                }
                break;
              }
            }
          } else if (nextEvent) {
            const startStr = nextEvent.startDate.toJSDate().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZone:'America/Chicago'});
            infoText = `Free until ${startStr}`;
          } else {
            infoText = "Free for the rest of the day";
          }

          const tile = document.createElement("div");
          tile.className = "tile";
          tile.innerHTML = `
            <div class="location">${loc}</div>
            <div class="light ${isOccupied ? 'red' : 'green'}"></div>
            <div>
              <div class="status" style="color:${isOccupied ? '#ff4444' : '#22ff44'}">
                ${isOccupied ? '🔴 OCCUPIED' : '🟢 FREE'}
              </div>
              <span class="info">${infoText}</span>
            </div>
          `;
          dashboard.appendChild(tile);
        });

        // Last updated
        const updatedEl = document.getElementById("lastUpdated");
        updatedEl.textContent = `Last updated: ${new Date().toLocaleTimeString('en-US', {timeZone:'America/Chicago', hour:'numeric', minute:'2-digit'})} Central`;

      } catch (err) {
        console.error(err);
        dashboard.innerHTML = `<p style="color:#ff6666;text-align:center;">Unable to load calendar.<br>Tap Refresh Now.</p>`;
      }
    }

    setInterval(loadDashboard, 90000); // every 90 seconds
    window.onload = loadDashboard;
  </script>
</body>
</html>
