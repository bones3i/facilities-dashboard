<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBU Facilities Live</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.4.0/ical.min.js"></script>
  <style>
    :root {
      --navy: #00263E;
      --gold: #F2C94C;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--navy);
      color: #fff;
      margin: 0;
      padding: 12px;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
    }

    /* Watermarked Logo Background */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      height: 380px;
      background: url('https://raw.githubusercontent.com/bones3i/facilities-dashboard/main/saber-m-w-gold.png') center/contain no-repeat;
      opacity: 0.06;
      z-index: 0;
      pointer-events: none;
    }

    h1 {
      color: var(--gold);
      font-size: 1.5em;
      margin: 8px 0 12px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .grid { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      position: relative;
      z-index: 1;
    }

    .tile {
      background: rgba(255,255,255,0.09);
      border-radius: 12px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr 110px 1fr;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      position: relative;
      z-index: 1;
    }

    .location { font-size: 1.2em; font-weight: bold; }
    .center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .light { width: 48px; height: 48px; border-radius: 50%; box-shadow: 0 0 16px currentColor; }
    .green { background: #22ff44; }
    .red   { background: #ff2222; }
    .gray  { background: #888888; }
    .status { font-size: 1.25em; font-weight: bold; }
    .info { font-size: 0.95em; opacity: 0.9; text-align: right; line-height: 1.3; }

    button {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 14px 20px;
      font-size: 1.1em;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin: 12px 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .last-updated {
      font-size: 0.85em;
      opacity: 0.7;
      text-align: center;
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
