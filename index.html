<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBU Facilities Live</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.4.0/ical.min.js"></script>
  <style>
    :root {
      --navy: #00263E;
      --gold: #F2C94C;
      --crimson: #9F1D35;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--navy);
      color: #fff;
      margin: 0;
      padding: 12px;
      max-width: 460px;
      margin: 0 auto;
    }
    h1 {
      color: var(--gold);
      font-size: 1.45em;
      margin: 0 0 12px;
      text-align: center;
    }
    .grid { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
    }
    .tile {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr 110px 1fr;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .location {
      font-size: 1.2em;
      font-weight: bold;
      text-align: left;
    }
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .light {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      box-shadow: 0 0 16px currentColor;
    }
    .green { background: #22ff44; }
    .red   { background: #ff2222; }
    .gray  { background: #888888; }
    .status {
      font-size: 1.25em;
      font-weight: bold;
      text-align: center;
    }
    .info {
      font-size: 0.95em;
      opacity: 0.9;
      text-align: right;
      line-height: 1.3;
    }
    button {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 12px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin: 12px 0 8px;
    }
    .last-updated {
      font-size: 0.85em;
      opacity: 0.7;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🏟️ MBU Facilities Live</h1>
  <button onclick="loadDashboard()">🔄 Refresh Now</button>
  <div id="dashboard" class="grid"></div>
  <div id="lastUpdated" class="last-updated"></div>

  <script>
    const ICS_URL = "https://outlook.office365.com/owa/calendar/97967830e98945e38f6aaefb6042710b@mbu.edu/0521f667626a42ee90cfb1ff0222d6338862321817573157099/calendar.ics";

    function isFacilityOpen(now = new Date()) {
      const day = now.getDay();
      const hour = now.getHours();
      const minute = now.getMinutes();
      const currentTime = hour * 60 + minute;

      let openTime, closeTime;

      if (day >= 1 && day <= 5) { // Mon–Fri
        openTime = 6 * 60;        // 6:00 AM
        closeTime = 21 * 60 + 45; // 9:45 PM
      } else if (day === 6) {     // Saturday
        openTime = 10 * 60;       // 10:00 AM
        closeTime = 21 * 60;      // 9:00 PM
      } else {                    // Sunday
        openTime = 19 * 60 + 45;  // 7:45 PM
        closeTime = 21 * 60 + 45; // 9:45 PM
      }
      return currentTime >= openTime && currentTime <= closeTime;
    }

    function getNextOpening(now = new Date()) {
      const day = now.getDay();
      if (day >= 1 && day <= 5) return "tomorrow at 6:00 AM";
      if (day === 6) return "tomorrow at 6:00 AM";
      return "tomorrow at 10:00 AM";
    }

    async function loadDashboard() {
      const dashboard = document.getElementById("dashboard");
      dashboard.innerHTML = "<p style='color:#F2C94C;text-align:center;padding:20px;'>Loading live data...</p>";

      try {
        let icsText;
        try { const r = await fetch(ICS_URL); if (r.ok) icsText = await r.text(); } catch(e){}
        if (!icsText) {
          const proxies = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?", "https://api.codetabs.com/v1/proxy?quest="];
          for (let p of proxies) {
            try {
              const r = await fetch(p + encodeURIComponent(ICS_URL));
              if (r.ok) { icsText = await r.text(); if (icsText.includes("BEGIN:VCALENDAR")) break; }
            } catch(e){}
          }
        }

        const jcalData = ICAL.parse(icsText);
        const comp = new ICAL.Component(jcalData);
        const events = comp.getAllSubcomponents("vevent");

        const now = new Date();
        const isOpen = isFacilityOpen(now);
        dashboard.innerHTML = "";

        const locations = ["Main Gym", "FCG", "Weight Room"];

        locations.forEach(loc => {
          let isOccupied = false;
          let currentEvent = null;
          let nextEvent = null;

          const relevant = events
            .map(vevent => new ICAL.Event(vevent))
            .filter(ev => (ev.location || "").toLowerCase().includes(loc.toLowerCase()))
            .sort((a,b) => a.startDate.toJSDate() - b.startDate.toJSDate());

          for (let ev of relevant) {
            const start = ev.startDate.toJSDate();
            const end = ev.endDate.toJSDate();
            if (start <= now && end >= now) {
              isOccupied = true;
              currentEvent = ev;
            } else if (!nextEvent && start > now) {
              nextEvent = ev;
              break;
            }
          }

          let lightClass = "gray";
          let statusText = "CLOSED";
          let statusColor = "#aaa";
          let infoText = `Opens ${getNextOpening(now)}`;

          if (isOpen) {
            if (isOccupied && currentEvent) {
              lightClass = "red";
              statusText = "OCCUPIED";
              statusColor = "#ff4444";
              const endStr = currentEvent.endDate.toJSDate().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZone:'America/Chicago'});
              infoText = `Available at ${endStr}`;
            } else {
              lightClass = "green";
              statusText = "FREE";
              statusColor = "#22ff44";
              const nextStr = nextEvent 
                ? nextEvent.startDate.toJSDate().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZone:'America/Chicago'})
                : "rest of day";
              infoText = `Free until ${nextStr}`;
            }
          }

          const tile = document.createElement("div");
          tile.className = "tile";
          tile.innerHTML = `
            <div class="location">${loc}</div>
            
            <div class="center">
              <div class="light ${lightClass}"></div>
              <div class="status" style="color:${statusColor}">${statusText}</div>
            </div>
            
            <div class="info">${infoText}</div>
          `;
          dashboard.appendChild(tile);
        });

        document.getElementById("lastUpdated").textContent = 
          `Last updated: ${now.toLocaleTimeString('en-US', {timeZone:'America/Chicago', hour:'numeric', minute:'2-digit'})} Central`;

      } catch (err) {
        console.error(err);
        dashboard.innerHTML = `<p style="color:#ff6666;text-align:center;padding:20px;">Error loading data.<br>Try Refresh Now.</p>`;
      }
    }

    setInterval(loadDashboard, 90000);
    window.onload = loadDashboard;
  </script>
</body>
</html>
